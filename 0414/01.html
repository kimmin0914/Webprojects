<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상태선택자</title>
    <!-- 상태선택자-->
    <style>
        input:enabled{
            background-color: blue;
        }
        input:disabled{
            background-color: azure;
        }
        input:focus {
            background-color: aqua;
        }
    </style>
</head>
<body>
    <h1>사용 가능한 상태</h1>
    <input type=""text"><br><br>
    <h1>사용 불가능한 상태</h1>
    <input type=""text" disabled><br><br>
</body>
</html>
