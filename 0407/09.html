<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .dolor h1{  /* 후손 모두 적용하기 */
            color: aqua;
            font-weight: bold;
        }

        .aliquam > h1{  /* 바로 밑에 직계만 적용하기*/
            color:blueviolet;
            background-color:burlywood;
        }
    </style>
</head>
<body>
    <div class = "dolor">
        <h1>Lorem ipsum dolor sit</h1>
        <div>
            <h1>Lorem ipsum dolor sit amet</h1>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing</p>
        </div>
    </div>

        <div class = aliquam>
        <h1>Lorem ipsum dolor sit</h1>
        <div>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing</p>
            <h1>Tenetur aliquam</h1>
        </div>
    </div>
</body>
</html>
